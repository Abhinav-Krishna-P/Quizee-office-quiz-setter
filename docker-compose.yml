version: '3.8'

services:
  # Database Service (named 'postgres' to match your DATABASE_URL host)
  postgres:
    image: postgres:15-alpine
    container_name: officequiz-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      # Interpolates POSTGRES_PASSWORD from your root .env, falling back to 'evo123456'
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evo123456}
      POSTGRES_DB: officequiz
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Backend Server Service
  server:
    build: ./server
    container_name: officequiz-server
    restart: always
    depends_on:
      - postgres
    environment:
      # Interpolates connection details and secrets directly from your root .env file
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: ${PORT:-4000}

  # Frontend Nginx Proxy Service
  client:
    build:
      context: ./client
    container_name: officequiz-client
    restart: always
    depends_on:
      - server
    ports:
      # Expose Nginx proxy to HTTP port 80
      - "80:80"

volumes:
  pgdata:
    driver: local
