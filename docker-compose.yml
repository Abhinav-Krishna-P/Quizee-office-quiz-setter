version: '3.8'

services:
  # Backend Server Service
  server:
    build: ./server
    container_name: officequiz-server
    restart: always
    environment:
      # Interpolates connection details and secrets directly from your root .env file
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: ${PORT:-4000}
    networks:
      - evolution-network

  # Frontend Nginx Proxy Service
  client:
    build:
      context: ./client
    container_name: officequiz-client
    restart: always
    depends_on:
      - server
    ports:
      # Expose Nginx proxy to HTTP port 8085 (since host port 80 is occupied)
      - "8085:80"
    networks:
      - evolution-network

networks:
  evolution-network:
    external: true
    name: evolution-network
